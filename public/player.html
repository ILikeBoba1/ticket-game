<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Night</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #00ffcc;
    }

    nav {
      margin-bottom: 20px;
    }

    nav button {
      padding: 10px 20px;
      margin: 0 10px;
      background-color: #00ffcc;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 5px;
      background-color: #333;
      color: #fff;
    }

    button[type="submit"], #startGameButton {
      padding: 10px 20px;
      background-color: #00ffcc;
      border: none;
      border-radius: 5px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
      width: 100%;
      max-width: 1000px;
      min-width: 600px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border: 1px solid #444;
    }

    .score-input {
      width: 60px;
      padding: 5px;
      border-radius: 4px;
      border: none;
      text-align: center;
      background-color: #333;
      color: #fff;
    }

    .highest {
      color: red;
      font-weight: bold;
    }

    .lowest {
      color: lightgreen;
      font-weight: bold;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      table, th, td {
        font-size: 14px;
      }
    }

    .cluedo-cell {
      text-align: left;
    }

    .cluedo-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .cluedo-label input[type="checkbox"] {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <h1>🎉 Game Night 🎉</h1>

  <nav>
    <button onclick="showSection('phaseTen')">Phase Ten</button>
    <button onclick="showSection('cluedo')">Cluedo</button>
  </nav>

  <section id="phaseTen" class="active">
    <h2>Phase Ten Tracker</h2>
    <div id="setup">
      <input type="text" id="playerInput" placeholder="Enter player names (2-12), separated by space">
      <br>
      <button id="startGameButton" onclick="startGame()">Start Game</button>
    </div>
    <div id="scoreboard" style="display:none">
      <form id="scoreForm">
        <div class="table-wrapper">
          <table id="scoreTable"></table>
        </div>
        <button type="submit">Done</button>
      </form>
    </div>
  </section>

  <section id="cluedo">
    <h2>Cluedo Checklist</h2>
    <img src="https://play-lh.googleusercontent.com/JMQugJWauP-w6E6afJf97RchfpGV8aGN8peqciyz2OLxnGOkszfeN8kyxu6qxKwYELg" alt="Cluedo">
    <h3>The Checklist</h3>
    <table>
      <tr>
        <th>People</th>
        <th>Where</th>
        <th>Weapons</th>
      </tr>
      <tr>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Peacock</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Patio</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Pistol</label></td>
      </tr>
      <tr>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Mustard</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Hall</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Knife</label></td>
      </tr>
      <tr>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Scarlet</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Kitchen</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Candlestick</label></td>
      </tr>
      <tr>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Green</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Living Room</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Rope</label></td>
      </tr>
      <tr>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">White</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Dining Room</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Dumbbell</label></td>
      </tr>
      <tr>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Plum</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Spa</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Trophy</label></td>
      </tr>
      <tr>
        <td></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Observatory</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Axe</label></td>
      </tr>
      <tr>
        <td></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Theatre</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Poison</label></td>
      </tr>
      <tr>
        <td></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Guest House</label></td>
        <td class="cluedo-cell"><label class="cluedo-label"><input type="checkbox">Bat</label></td>
      </tr>
    </table>
  </section>

  <audio id="startSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
  <audio id="submitSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

  <script>
    function showSection(sectionId) {
      document.querySelectorAll('section').forEach(section => {
        section.classList.remove('active');
      });
      document.getElementById(sectionId).classList.add('active');
    }

    let players = [];
    let phaseCounters = {};
    let scoreTotals = {};
    let scoreHistory = {};

    function playSound(id) {
      const audio = document.getElementById(id);
      if (audio) audio.play();
    }

    function startGame() {
      const input = document.getElementById('playerInput').value.trim();
      players = input.split(/\s+/);

      if (players.length < 2 || players.length > 12) {
        alert('Please enter between 2 and 12 players.');
        return;
      }

      players.forEach(player => {
        phaseCounters[player] = 1;
        scoreTotals[player] = 0;
        scoreHistory[player] = [];
      });

      document.getElementById('setup').style.display = 'none';
      document.getElementById('scoreboard').style.display = 'block';
      renderTable();
      playSound('startSound');
    }

    function renderTable() {
      const table = document.getElementById('scoreTable');
      table.innerHTML = '';

      const headerRow = document.createElement('tr');
      const roundHeader = document.createElement('th');
      roundHeader.textContent = 'Round';
      headerRow.appendChild(roundHeader);
      players.forEach(player => {
        const th = document.createElement('th');
        th.textContent = player;
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      const totalRounds = scoreHistory[players[0]].length || 0;
      for (let i = 0; i < totalRounds; i++) {
        const tr = document.createElement('tr');
        const label = document.createElement('td');
        label.textContent = `Round ${i + 1}`;
        tr.appendChild(label);
        players.forEach(player => {
          const td = document.createElement('td');
          td.textContent = scoreHistory[player][i] ?? '';
          tr.appendChild(td);
        });
        table.appendChild(tr);
      }

      const phaseRow = document.createElement('tr');
      const phaseLabel = document.createElement('td');
      phaseLabel.textContent = 'Phase';
      phaseRow.appendChild(phaseLabel);
      players.forEach(player => {
        const td = document.createElement('td');
        td.textContent = "Phase " + phaseCounters[player];
        td.className = 'phase';
        phaseRow.appendChild(td);
      });
      table.appendChild(phaseRow);

      const scoreRow = document.createElement('tr');
      const totalLabel = document.createElement('td');
      totalLabel.textContent = 'Total';
      scoreRow.appendChild(totalLabel);
      players.forEach(player => {
        const td = document.createElement('td');
        td.textContent = scoreTotals[player];
        td.className = 'total';
        scoreRow.appendChild(td);
      });
      table.appendChild(scoreRow);

      const inputRow = document.createElement('tr');
      const inputLabel = document.createElement('td');
      inputLabel.textContent = 'Enter';
      inputRow.appendChild(inputLabel);
      players.forEach(player => {
        const td = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'number';
        input.min = '0';
        input.className = 'score-input';
        input.name = `score-${player}`;
        input.addEventListener('keydown', function(event) {
          if (event.key === 'Enter') {
            event.preventDefault();
          }
        });
        td.appendChild(input);
        inputRow.appendChild(td);
      });
      table.appendChild(inputRow);
    }

    document.getElementById('scoreForm').addEventListener('submit', function(e) {
      e.preventDefault();
      players.forEach(player => {
        const input = document.querySelector(`[name='score-${player}']`);
        const score = parseInt(input.value);
        if (!isNaN(score)) {
          if (score < 50) {
            phaseCounters[player]++;
          }
          scoreTotals[player] += score;
          scoreHistory[player].push(score);
        }
        input.value = '';
      });
      updateColors();
      renderTable();
      playSound('submitSound');
    });

    function updateColors() {
      const scores = players.map(player => scoreTotals[player]);
      const maxScore = Math.max(...scores);
      const minScore = Math.min(...scores);
      document.querySelectorAll('.total').forEach(td => {
        const value = parseInt(td.textContent);
        td.classList.remove('highest', 'lowest');
        if (value === maxScore) {
          td.classList.add('highest');
        } else if (value === minScore) {
          td.classList.add('lowest');
        }
      });
    }
  </script>
</body>
</html>
