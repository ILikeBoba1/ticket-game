<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Night - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:linear-gradient(135deg,#1a1a1a,#242424,#2f2f2f);color:white;text-align:center}
header{padding:24px;font-size:30px;font-weight:700}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);padding:18px;border-radius:14px;margin:16px 0;box-shadow:0 10px 25px rgba(0,0,0,.3)}
button{padding:10px 16px;border:none;border-radius:10px;margin:6px;font-size:14px;background:#ffd54f;cursor:pointer}
button:hover{transform:scale(1.03)}
button.danger{background:#ffb3b3}
.small{font-size:13px;opacity:.85}
.status{font-size:16px}
.table-wrap{overflow-x:auto;margin-top:10px}
table{width:100%;border-collapse:collapse;min-width:700px}
th,td{padding:9px;border-bottom:1px solid rgba(255,255,255,0.15);font-size:13px;text-align:left;vertical-align:top}
th{text-transform:uppercase;font-size:12px;letter-spacing:.4px;color:#ddd}
code{background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:6px}
</style>
</head>
<body>
<header>Game Night Admin</header>
<div class="container">
  <div class="card">
    <h2>Phase Ten History</h2>
    <p class="status">Status: <span id="status">Loading...</span></p>
    <button id="refreshBtn">Refresh</button>
    <button id="downloadBtn">Download JSON</button>
    <button id="clearBtn" class="danger">Clear All History</button>
    <p class="small">This manages shared history seen by all phones at <code>/</code> -> <code>History</code>.</p>
  </div>

  <div class="card">
    <h3>Saved Games</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Played At</th>
            <th>Winner(s)</th>
            <th>Players</th>
            <th>Rounds</th>
            <th>Rule</th>
            <th>Detail</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let adminKey = '';
let cachedHistory = [];

async function api(path, options = {}) {
  const res = await fetch(path, {
    method: options.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-key': adminKey
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(data.error || 'Request failed');
  }

  return data;
}

function esc(text) {
  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function fmtDate(value) {
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return value || '-';
  return d.toLocaleString();
}

async function loadHistory() {
  const data = await api('/api/admin/phase/history');
  cachedHistory = Array.isArray(data.history) ? data.history : [];

  $('status').innerText = `Loaded ${cachedHistory.length} game(s)`;

  const tbody = $('rows');
  tbody.innerHTML = '';

  if (!cachedHistory.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="6">No history yet.</td>';
    tbody.appendChild(tr);
    return;
  }

  cachedHistory.forEach((item) => {
    const winners = (item.winners || []).join(', ') || '-';
    const players = (item.players || []).join(', ') || '-';

    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + esc(fmtDate(item.playedAt)) + '</td>' +
      '<td>' + esc(winners) + '</td>' +
      '<td>' + esc(players) + '</td>' +
      '<td>' + esc(item.rounds ?? '-') + '</td>' +
      '<td>' + esc(item.rule || '-') + '</td>' +
      '<td>' + esc(item.detail || '-') + '</td>';

    tbody.appendChild(tr);
  });
}

function downloadHistory() {
  const blob = new Blob([JSON.stringify(cachedHistory, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'phase_ten_history.json';
  a.click();
}

async function clearHistory() {
  const ok = confirm('Clear all shared Phase Ten history? This affects all devices.');
  if (!ok) return;

  await api('/api/admin/phase/history', { method: 'DELETE' });
  await loadHistory();
}

$('refreshBtn').addEventListener('click', () => loadHistory().catch((err) => {
  $('status').innerText = 'Error';
  alert(err.message);
}));
$('downloadBtn').addEventListener('click', downloadHistory);
$('clearBtn').addEventListener('click', () => clearHistory().catch((err) => {
  $('status').innerText = 'Error';
  alert(err.message);
}));

adminKey = prompt('Admin key:') || '';

loadHistory().catch((err) => {
  $('status').innerText = 'Error';
  alert(err.message);
});
</script>
</body>
</html>
